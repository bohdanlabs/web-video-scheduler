<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TV Scheduler widget — drop-in scheduled video overlay for any website">
<title>TV Scheduler widget — drop-in scheduled video overlay for any website</title>
<desc>A browser window showing a website with a scheduled video overlay playing on top. A separate schedule.json file connects to the website with an arrow, illustrating that the schedule is controlled externally without page changes.</desc>

<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="40" y="40" width="430" height="280" rx="10" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>

<rect x="40" y="40" width="430" height="36" rx="10" fill="#F1EFE8"/>
<rect x="40" y="64" width="430" height="12" fill="#F1EFE8"/>
<circle cx="58" cy="58" r="5" fill="#E24B4A"/>
<circle cx="74" cy="58" r="5" fill="#EF9F27"/>
<circle cx="90" cy="58" r="5" fill="#97C459"/>
<rect x="120" y="50" width="280" height="16" rx="8" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="135" y="62" font-family="sans-serif" font-size="11" fill="#888780">yoursite.com</text>

<rect x="60" y="92" width="180" height="24" rx="4" fill="#534AB7"/>
<rect x="74" y="100" width="60" height="8" rx="2" fill="#CECBF6"/>
<rect x="150" y="100" width="40" height="8" rx="2" fill="#CECBF6" opacity="0.6"/>
<rect x="200" y="100" width="32" height="8" rx="2" fill="#CECBF6" opacity="0.6"/>

<rect x="60" y="128" width="390" height="56" rx="6" fill="#F1EFE8"/>
<rect x="76" y="142" width="120" height="10" rx="2" fill="#444441"/>
<rect x="76" y="160" width="200" height="6" rx="1" fill="#888780"/>
<rect x="76" y="172" width="160" height="6" rx="1" fill="#888780"/>

<rect x="60" y="200" width="120" height="100" rx="6" fill="#E6F1FB"/>
<rect x="74" y="214" width="60" height="8" rx="1" fill="#185FA5"/>
<rect x="74" y="232" width="92" height="4" rx="1" fill="#85B7EB"/>
<rect x="74" y="242" width="80" height="4" rx="1" fill="#85B7EB"/>
<rect x="74" y="252" width="60" height="4" rx="1" fill="#85B7EB"/>

<rect x="195" y="200" width="120" height="100" rx="6" fill="#E1F5EE"/>
<rect x="209" y="214" width="60" height="8" rx="1" fill="#0F6E56"/>
<rect x="209" y="232" width="92" height="4" rx="1" fill="#5DCAA5"/>
<rect x="209" y="242" width="80" height="4" rx="1" fill="#5DCAA5"/>
<rect x="209" y="252" width="60" height="4" rx="1" fill="#5DCAA5"/>

<rect x="330" y="200" width="120" height="100" rx="6" fill="#FAEEDA"/>
<rect x="344" y="214" width="60" height="8" rx="1" fill="#854F0B"/>
<rect x="344" y="232" width="92" height="4" rx="1" fill="#EF9F27"/>
<rect x="344" y="242" width="80" height="4" rx="1" fill="#EF9F27"/>
<rect x="344" y="252" width="60" height="4" rx="1" fill="#EF9F27"/>

<rect x="100" y="120" width="310" height="180" rx="6" fill="#0a0a0a" stroke="#534AB7" stroke-width="2"/>
<polygon points="235,180 235,240 285,210" fill="#AFA9EC"/>
<text x="255" y="262" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#CECBF6">Scheduled overlay</text>
<text x="255" y="280" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7F77DD">plays at the configured time</text>

<g transform="translate(510, 130)">
  <rect x="0" y="0" width="140" height="160" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <rect x="0" y="0" width="140" height="28" rx="8" fill="#444441"/>
  <rect x="0" y="20" width="140" height="8" fill="#444441"/>
  <text x="14" y="19" font-family="monospace" font-size="11" fill="#FFFFFF">schedule.json</text>
  
  <text x="14" y="48" font-family="monospace" font-size="10" fill="#888780">{</text>
  <text x="20" y="62" font-family="monospace" font-size="10" fill="#185FA5">"schedule":</text>
  <text x="20" y="76" font-family="monospace" font-size="10" fill="#444441">[{</text>
  <text x="26" y="90" font-family="monospace" font-size="10" fill="#27500A">"time":</text>
  <text x="64" y="90" font-family="monospace" font-size="10" fill="#A32D2D">"08:59"</text>
  <text x="26" y="104" font-family="monospace" font-size="10" fill="#27500A">"video":</text>
  <text x="68" y="104" font-family="monospace" font-size="10" fill="#A32D2D">"..."</text>
  <text x="26" y="118" font-family="monospace" font-size="10" fill="#27500A">"days":</text>
  <text x="64" y="118" font-family="monospace" font-size="10" fill="#A32D2D">[1-5]</text>
  <text x="20" y="132" font-family="monospace" font-size="10" fill="#444441">}]</text>
  <text x="14" y="146" font-family="monospace" font-size="10" fill="#888780">}</text>
</g>

<path d="M 510 210 Q 490 210 480 200" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="494" y="195" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#534AB7">fetched</text>
<text x="494" y="208" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#534AB7">every minute</text>

<text x="40" y="345" font-family="sans-serif" font-size="13" font-weight="500" fill="#444441">Your existing website</text>
<text x="40" y="362" font-family="sans-serif" font-size="11" fill="#888780">paste the widget once, control the schedule remotely</text>

</svg>
