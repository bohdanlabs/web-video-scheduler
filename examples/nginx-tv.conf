# nginx config for serving a TV Scheduler page on a kiosk display.
# Use this if you're running the standalone or with-iframe example on a
# local Linux server (e.g. a Raspberry Pi or small VPS) and accessing it
# from an Android TV box / kiosk browser on the same network.

server {
    listen 8080;
    server_name _;
    root /path/to/tv-scheduler/examples;
    index standalone.html;

    charset utf-8;

    location / {
        try_files $uri $uri/ =404;
    }
}
