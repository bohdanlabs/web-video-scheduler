<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Scheduler — standalone</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }
    </style>
</head>
<body>

    <!--
        This is a minimal standalone example: a blank black page with the
        scheduler widget embedded. Use this when you want a TV/kiosk display
        that just plays scheduled videos and nothing else between plays.

        For the widget to do anything visible, edit the CONFIG_URL below to
        point at your hosted schedule.json file.
    -->


    <!-- ===== TV Scheduler widget (paste of widget.html) ===== -->

    <style>
      #vs-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100vw;
        height: 100vh;
        background: #000;
        z-index: 2147483647;
        align-items: center;
        justify-content: center;
      }
      #vs-overlay.active { display: flex; }
      #vs-overlay video {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      #vs-unlock {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 2147483646;
        padding: 18px 30px;
        background: rgba(0, 100, 200, 0.95);
        color: #fff;
        font-family: sans-serif;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        display: none;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      }
      #vs-unlock.show { display: block; }
    </style>

    <div id="vs-overlay"></div>
    <button id="vs-unlock">Tap to enable sound</button>

    <script>
    (function() {
      'use strict';

      const CONFIG_URL = 'https://your-server.example.com/schedule.json';
      const SCREEN_ID = new URLSearchParams(location.search).get('screen') || 'all';
      const CONFIG_REFRESH_MS = 60 * 1000;

      const overlay = document.getElementById('vs-overlay');
      const unlockBtn = document.getElementById('vs-unlock');

      let schedule = [];
      let lastTriggered = {};
      let audioUnlocked = false;
      let safetyTimer = null;
      let player = null;

      unlockBtn.classList.add('show');

      function unlockAudio() {
        if (audioUnlocked) return;
        try {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (AudioCtx) {
            const ctx = new AudioCtx();
            if (ctx.state === 'suspended') ctx.resume();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            gain.gain.value = 0;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.001);
          }
          audioUnlocked = true;
          unlockBtn.classList.remove('show');
        } catch (err) {
          console.error('[tv-scheduler] Audio unlock failed:', err);
          audioUnlocked = true;
          unlockBtn.classList.remove('show');
        }
      }

      unlockBtn.addEventListener('click', unlockAudio);
      document.body.addEventListener('click', unlockAudio, { capture: true });
      document.body.addEventListener('keydown', unlockAudio, { capture: true });
      document.body.addEventListener('touchstart', unlockAudio, { capture: true });

      async function loadConfig() {
        try {
          const response = await fetch(CONFIG_URL + '?t=' + Date.now(), { cache: 'no-store' });
          if (!response.ok) throw new Error('HTTP ' + response.status);
          const data = await response.json();
          schedule = (data.schedule || []).filter(item => {
            if (!item.screens || item.screens.length === 0) return true;
            return item.screens.includes('all') || item.screens.includes(SCREEN_ID);
          });
        } catch (err) {
          console.error('[tv-scheduler] Failed to load schedule:', err);
        }
      }

      function playVideo(item) {
        player = document.createElement('video');
        player.playsInline = true;
        player.muted = false;
        player.volume = 1.0;

        const source = document.createElement('source');
        source.src = item.video_url;
        source.type = 'video/mp4';
        player.appendChild(source);

        player.addEventListener('ended', stopVideo);

        overlay.appendChild(player);
        overlay.classList.add('active');

        player.play().catch(err => {
          player.muted = true;
          player.play();
        });

        const safetyMs = (item.max_duration_sec || 300) * 1000;
        safetyTimer = setTimeout(stopVideo, safetyMs);
      }

      function stopVideo() {
        overlay.classList.remove('active');
        if (player) {
          player.pause();
          player.removeAttribute('src');
          player.load();
          if (player.parentNode) player.parentNode.removeChild(player);
          player = null;
        }
        if (safetyTimer) {
          clearTimeout(safetyTimer);
          safetyTimer = null;
        }
      }

      function checkSchedule() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const currentTime = hh + ':' + mm;
        const dateKey = now.toDateString();
        const dayOfWeek = now.getDay();

        for (const item of schedule) {
          if (item.time !== currentTime) continue;
          if (item.days && item.days.length > 0 && !item.days.includes(dayOfWeek)) continue;
          const triggerKey = dateKey + '|' + item.time + '|' + item.video_url;
          if (lastTriggered[triggerKey]) continue;
          lastTriggered[triggerKey] = true;
          playVideo(item);
          break;
        }
      }

      loadConfig();
      setInterval(loadConfig, CONFIG_REFRESH_MS);
      setInterval(checkSchedule, 1000);

      setInterval(() => {
        const today = new Date().toDateString();
        for (const key in lastTriggered) {
          if (!key.startsWith(today)) delete lastTriggered[key];
        }
      }, 60 * 60 * 1000);

    })();
    </script>

</body>
</html>
